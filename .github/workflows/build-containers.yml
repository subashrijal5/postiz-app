---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        arch:
          - runnertags: ubuntu-latest
            name: amd64
          - runnertags: ubuntu-24.04-arm
            name: arm64
        component:
          - name: frontend
            target: runtime-frontend
          - name: backend
            target: runtime-backend
          - name: orchestrator
            target: runtime-orchestrator
    runs-on: ${{ matrix.arch.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
          IMAGE: ghcr.io/subashrijal5/postiz-app-${{ matrix.component.name }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch.name }} \
            -f Dockerfile \
            --target ${{ matrix.component.target }} \
            -t ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-${{ matrix.arch.name }} \
            --build-arg NEXT_PUBLIC_VERSION=${{ env.NEXT_PUBLIC_VERSION }} \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --output "type=registry,name=${{ env.IMAGE }}:${{ env.CONTAINERVER }}-${{ matrix.arch.name }}" .

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    strategy:
      matrix:
        component: [frontend, backend, orchestrator]
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker Manifest
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          IMAGE: ghcr.io/subashrijal5/postiz-app-${{ matrix.component }}
        run: |
          # Verify the architecture images
          echo "Verifying AMD64 image:"
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-amd64

          echo "Verifying ARM64 image:"
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-arm64

          # Try to remove any existing manifests first
          docker manifest rm ${{ env.IMAGE }}:${{ env.CONTAINERVER }} || true
          docker manifest rm ${{ env.IMAGE }}:latest || true

          # Create and push the version-specific manifest
          docker manifest create ${{ env.IMAGE }}:${{ env.CONTAINERVER }} \
            --amend ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-amd64 \
            --amend ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-arm64

          docker manifest push ${{ env.IMAGE }}:${{ env.CONTAINERVER }}

          # Create and push the latest manifest
          docker manifest create ${{ env.IMAGE }}:latest \
            --amend ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-amd64 \
            --amend ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-arm64

          docker manifest push ${{ env.IMAGE }}:latest

      - name: Verify Manifest
        env:
          IMAGE: ghcr.io/subashrijal5/postiz-app-${{ matrix.component }}
        run: |
          docker manifest inspect ${{ env.IMAGE }}:latest

  trigger-deploy:
    needs: build-container-manifest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: frontend
            secretKey: DEPLOY_WEBHOOK_FRONTEND
          - name: backend
            secretKey: DEPLOY_WEBHOOK_BACKEND
          - name: orchestrator
            secretKey: DEPLOY_WEBHOOK_ORCHESTRATOR
    steps:
      - name: Trigger Dokploy deploy
        env:
          WEBHOOK_URL: ${{ secrets[matrix.component.secretKey] }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No ${{ matrix.component.secretKey }} secret set - skipping (add it in repo secrets to enable auto-deploy for ${{ matrix.component.name }})"
            exit 0
          fi
          curl -X POST "$WEBHOOK_URL" \
            -w "\nHTTP status: %{http_code}\n" \
            --fail-with-body
